<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 공학개론 | 조교팀 & 공지사항</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; scroll-behavior: smooth; }
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal.hidden { opacity: 0; visibility: hidden; display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 overflow-x-hidden">

    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-xl font-black text-blue-700">BME_AIM_LAB</a>
            <div class="hidden md:flex space-x-8 font-semibold text-sm text-gray-600">
                <a href="#home" class="hover:text-blue-600 transition">Course</a>
                <a href="#notices" class="hover:text-blue-600 transition">Notices</a>
                <a href="#team" class="hover:text-blue-600 transition">TA Team</a>
            </div>
        </div>
    </nav>

    <section id="home" class="pt-40 pb-20 text-center px-6 bg-gradient-to-b from-blue-50 to-white">
        <span class="inline-block px-4 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-full mb-6" data-aos="fade-down">2026 AI 공학개론</span>
        <h1 class="text-5xl md:text-6xl font-black mb-6 leading-tight" data-aos="fade-up">공지사항 및 조교진 안내</h1>
        <p class="text-gray-600 max-w-2xl mx-auto mb-10" data-aos="fade-up" data-aos-delay="100">
            바이오메디컬 인공지능의 세계에 오신 것을 환영합니다. <br>
            수업 관련 최신 소식과 조교진의 도움을 여기서 확인하세요.
        </p>
    </section>

    <section id="notices" class="py-20 px-6 max-w-5xl mx-auto">
        <div class="flex justify-between items-end mb-10" data-aos="fade-up">
            <div>
                <h2 class="text-3xl font-black text-gray-900">Notice</h2>
                <p class="text-gray-500 text-sm mt-2">수업 및 실습 관련 중요 공지입니다.</p>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-gray-100" data-aos="fade-up" data-aos-delay="100">
            <div id="notice-list"></div>
        </div>
    </section>

    <section id="team" class="py-32 px-6 max-w-7xl mx-auto">
        <h2 class="text-3xl font-black mb-16 text-center" data-aos="fade-up">Teaching Assistants</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 hover:shadow-2xl transition-all" data-aos="fade-up">
                <div class="text-4xl mb-4">🎓</div>
                <h3 class="text-xl font-bold mb-1">조교 1 (Head)</h3>
                <p class="text-blue-600 text-xs font-bold mb-4 uppercase">Management</p>
                <button onclick="openTAModal('member1')" class="text-sm font-bold text-gray-400 hover:text-blue-600 transition">오피스 아워 보기 →</button>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 hover:shadow-2xl transition-all" data-aos="fade-up" data-aos-delay="100">
                <div class="text-4xl mb-4">💻</div>
                <h3 class="text-xl font-bold mb-1">조교 2 (Tech)</h3>
                <p class="text-purple-600 text-xs font-bold mb-4 uppercase">Python / DL</p>
                <button onclick="openTAModal('member2')" class="text-sm font-bold text-gray-400 hover:text-purple-600 transition">오피스 아워 보기 →</button>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-100 hover:shadow-2xl transition-all" data-aos="fade-up" data-aos-delay="200">
                <div class="text-4xl mb-4">🧬</div>
                <h3 class="text-xl font-bold mb-1">조교 3 (Domain)</h3>
                <p class="text-emerald-600 text-xs font-bold mb-4 uppercase">Medical Domain</p>
                <button onclick="openTAModal('member3')" class="text-sm font-bold text-gray-400 hover:text-emerald-600 transition">오피스 아워 보기 →</button>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-16 text-center">
        <p class="text-gray-500 text-sm">© 2026 AI 공학개론 조교팀</p>
    </footer>

    <div id="modal-bg" class="modal hidden fixed inset-0 bg-black/80 z-[100] items-center justify-center p-6" onclick="closeModal()">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 relative shadow-2xl" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-gray-400 hover:text-black text-3xl">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // 1. 공지사항 데이터 (여기에 새로운 공지를 추가하세요!)
        const notices = [
            {
                id: 1,
                tag: "중요",
                tagColor: "bg-red-100 text-red-600",
                title: "1주차 실습 환경(Anaconda/PyTorch) 설정 가이드",
                date: "2026.03.11",
                content: "실습을 위해 개인 노트북에 Anaconda를 미리 설치해 오시기 바랍니다. 설치 중 오류가 발생하는 경우 수요일 오피스 아워에 방문해 주세요."
            },
            {
                id: 2,
                tag: "과제",
                tagColor: "bg-blue-100 text-blue-600",
                title: "Quiz 1 일정 안내 (생체신호 기초)",
                date: "2026.03.08",
                content: "3월 15일 수업 시작 전 15분간 퀴즈가 진행될 예정입니다. 범위는 1~2장 강의 교안입니다."
            },
            {
                id: 3,
                tag: "안내",
                tagColor: "bg-gray-100 text-gray-600",
                title: "중간고사 프로젝트 조 편성 결과 발표",
                date: "2026.03.02",
                content: "조 편성 결과는 LMS 게시판을 통해 확인할 수 있습니다. 조장 선출 후 3월 20일까지 주제를 제출해 주세요."
            }
        ];

        // 2. 조교 데이터
        const taData = {
            member1: { name: "조교 1", role: "운영 총괄", info: "010-0000-0000" },
            member2: { name: "조교 2", role: "기술 지원", info: "010-0000-0000" },
            member3: { name: "조교 3", role: "도메인 특화", info: "010-0000-0000" }
        };

        // 공지사항 리스트 화면에 그리기
        const noticeList = document.getElementById('notice-list');
        notices.forEach((notice, index) => {
            const item = document.createElement('div');
            item.className = `flex items-center justify-between p-6 cursor-pointer hover:bg-blue-50 transition-colors border-b border-gray-50 last:border-0`;
            item.onclick = () => openNoticeModal(index);
            item.innerHTML = `
                <div class="flex items-center gap-4">
                    <span class="px-3 py-1 rounded-full text-[10px] font-bold ${notice.tagColor}">${notice.tag}</span>
                    <span class="font-bold text-gray-800 truncate max-w-[200px] md:max-w-md">${notice.title}</span>
                </div>
                <span class="text-xs text-gray-400 font-medium">${notice.date}</span>
            `;
            noticeList.appendChild(item);
        });

        // 공지 모달 열기
        function openNoticeModal(index) {
            const notice = notices[index];
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <span class="inline-block px-3 py-1 rounded-full text-[10px] font-bold ${notice.tagColor} mb-4">${notice.tag}</span>
                <h2 class="text-2xl font-black mb-2">${notice.title}</h2>
                <p class="text-gray-400 text-xs mb-8">게시일: ${notice.date}</p>
                <div class="bg-gray-50 p-6 rounded-2xl text-gray-700 leading-relaxed">
                    ${notice.content}
                </div>
            `;
            showModal();
        }

        // 조교 모달 열기
        function openTAModal(id) {
            const ta = taData[id];
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h2 class="text-3xl font-black mb-2">${ta.name}</h2>
                <p class="text-blue-600 font-bold mb-8">${ta.role}</p>
                <div class="bg-blue-50 p-6 rounded-2xl text-blue-800 font-bold">
                    📍 상담 안내: ${ta.info}
                </div>
            `;
            showModal();
        }

        function showModal() {
            document.getElementById('modal-bg').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-bg').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
